<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端畅聊 - 聊天室</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>
    <!-- 遮罩层背景 -->
    <div class="cover"></div>
    
    <!-- 主容器 -->
    <div class="client-container">
        <div class="main">
            <!-- 左侧区域 -->
            <div class="left">
                <div class="user"></div>
                <div class="search">
                    <input type="text" placeholder="搜索..." id="searchInput">
                    <button id="searchBtn"></button>
                </div>
                <div class="tab">
                    <div class="tab-session"></div>
                    <div class="tab-friend"></div>
                </div>
                <ul class="list" id="session-list"></ul>
                <ul class="list hide" id="friend-list"></ul>
            </div>
            
            <!-- 右侧区域 -->
            <div class="right">
                <div class="title">
                    <span id="chatTitle">请选择会话</span>
                    <button class="add-friend-btn" id="addFriendBtn" title="添加好友">+</button>
                </div>
                <div class="message-show" id="messageShow"></div>
                <textarea class="message-input" id="messageInput" placeholder="输入消息..."></textarea>
                <div class="ctrl">
                    <button id="sendBtn">发送消息</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加好友模态框 -->
    <div id="addFriendModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加好友</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="searchUsername" placeholder="输入用户名进行搜索...">
                <div id="searchResult" class="search-result"></div>
            </div>
            <div class="modal-footer">
                <button id="cancelModalBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 引入 jQuery -->
    <script src="http://libs.baidu.com/jquery/2.0.0/jquery.min.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
